version: "3.8"

services:
  app:
    build:
      context: .
    container_name: notepad-app
    ports:
      - "8080:8080"
    networks:
      - notepad-network
    depends_on:
      - db
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  db:
    image: mysql:5.7
    container_name: mysql-db
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: notesdb
    networks:
      - notepad-network
    ports:
      - "3306:3306"
    volumes:
      - /home/ubuntu/volumes/notepad-app-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-prootpass"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

networks:
  notepad-network:
    driver: bridge

